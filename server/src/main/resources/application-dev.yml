spring:
  datasource:
    url: ${DEV_DB_URL:jdbc:h2:mem:web_starter;MODE=MySQL;DATABASE_TO_UPPER=false}
    username: ${DEV_DB_USERNAME:sa}
    password: ${DEV_DB_PASSWORD:}
    driver-class-name: ${DEV_DB_DRIVER:org.h2.Driver}

  sql:
    init:
      mode: ${DEV_SQL_INIT_MODE:always}

app:
  cors:
    allowed-origins: ${DEV_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  jwt:
    secret: ${DEV_JWT_SECRET:dev-only-jwt-secret-key-change-me-please-32chars}
    access-token-minutes: ${DEV_JWT_ACCESS_TOKEN_MINUTES:60}
