server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: web_starter_was

  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:server/.env[.properties]

  profiles:
    default: dev

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
