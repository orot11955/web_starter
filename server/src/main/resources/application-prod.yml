spring:
  datasource:
    url: ${PROD_DB_URL}
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}
    driver-class-name: ${PROD_DB_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

  sql:
    init:
      mode: ${PROD_SQL_INIT_MODE:never}

app:
  cors:
    allowed-origins: ${PROD_CORS_ALLOWED_ORIGINS}

  jwt:
    secret: ${PROD_JWT_SECRET}
    access-token-minutes: ${PROD_JWT_ACCESS_TOKEN_MINUTES:60}
